<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f4f5f7;color:#1a2332;font-size:14px}

.content{max-width:1200px;margin:0 auto;padding:20px}

/* Status bar */
.sbar{display:flex;align-items:center;gap:8px;font-size:11px;color:#8a9bb0;margin-bottom:16px;flex-wrap:wrap}
.sdot{width:7px;height:7px;border-radius:50%;background:#8a9bb0;flex-shrink:0}
.sdot.ok{background:#1a7a4a;box-shadow:0 0 6px #1a7a4a44}
.sdot.busy{background:#c9a84c;animation:pulse .7s infinite}
.sdot.err{background:#c0392b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BIAS hero */
.bias-hero{background:#fff;border:1px solid #e2e6ec;border-radius:10px;overflow:hidden;margin-bottom:14px}
.bias-hero-top{padding:14px 20px;border-bottom:1px solid #e2e6ec;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.bias-hero-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#8a9bb0}

.bias-hero-body{display:grid;grid-template-columns:160px 1fr;gap:0}

.verdict-block{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;gap:8px;border-right:1px solid #e2e6ec}
.verdict-arrow{font-size:42px;line-height:1}
.verdict-label{font-size:17px;font-weight:700;letter-spacing:.5px}
.verdict-conf{font-size:11px;color:#8a9bb0}
.verdict-pct{font-size:28px;font-weight:700;line-height:1}
.verdict-pct-label{font-size:10px;color:#8a9bb0;text-align:center}
.conf-bar-wrap{width:80px;height:5px;background:#edf0f5;border-radius:3px;overflow:hidden}

.analysis-block{padding:20px;display:flex;flex-direction:column;gap:10px}

.reason-row{display:flex;gap:10px;font-size:12px;line-height:1.6;align-items:flex-start}
.reason-icon{flex-shrink:0;font-size:14px;margin-top:1px}

.tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 7px;border-radius:3px;margin-left:3px;vertical-align:middle}
.tag-long{background:#e6f4ea;color:#1a7a4a}
.tag-short{background:#fce8e8;color:#b91c1c}
.tag-neutral{background:#fef9e7;color:#92400e}
.tag-warn{background:#fef3c7;color:#92400e}

.breaker-box{background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:10px 14px;margin-top:4px}
.breaker-title{font-size:10px;font-weight:600;color:#92400e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* Price + COT overlap */
.overlap-box{background:#fff;border:1px solid #e2e6ec;border-radius:8px;padding:16px 18px;margin-bottom:14px}
.overlap-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#8a9bb0;margin-bottom:12px}
.overlap-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:12px}

<body>

<div class="header">
  <div>
    <h1>COT ML Analiz Sistemi</h1>
    <div class="header-sub">CFTC verisi + Yahoo Finance fiyatı → Otomatik ML BIAS + Yön Tahmini</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="last-run" style="font-size:11px;color:#7a9cbf"></span>
    <button class="run-btn" id="run-btn" onclick="runAll()">▶ Analiz Et</button>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="content">
  <div class="sbar"><span class="sdot" id="sdot"></span><span id="stext">Hazır — "Analiz Et" butonuna basın</span></div>
  <div id="content">
    <div class="empty">
      <div class="empty-icon">◎</div>
      <div class="empty-title">Analiz bekleniyor</div>
      <div class="empty-sub">Butona basınca COT + fiyat verisi otomatik çekilir, ML modeli çalışır</div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// EMTİA TANIMLARI
// ════════════════════════════════════════════════════════════════
const COMMODITIES = [
  {key:'gold',   label:'🥇 Altın',      api:'legacy', mkt:'GOLD - COMMODITY EXCHANGE INC.',                         yf:'GC=F',  histRange:[-20000,280000]},
  {key:'silver', label:'🥈 Gümüş',      api:'legacy', mkt:'SILVER - COMMODITY EXCHANGE INC.',                       yf:'SI=F',  histRange:[-15000,80000]},
  {key:'crude',  label:'🛢 Ham Petrol',  api:'legacy', mkt:'CRUDE OIL, LIGHT SWEET - NEW YORK MERCANTILE EXCHANGE', yf:'CL=F',  histRange:[-50000,400000]},
  {key:'natgas', label:'⛽ Doğal Gaz',   api:'legacy', mkt:'NATURAL GAS (HENRY HUB) - NEW YORK MERCANTILE EXCHANGE',yf:'NG=F',  histRange:[-150000,80000]},
  {key:'copper', label:'🔶 Bakır',       api:'legacy', mkt:'COPPER- #1 - COMMODITY EXCHANGE INC.',                  yf:'HG=F',  histRange:[-30000,100000]},
  {key:'sp500',  label:'📈 S&P 500',     api:'tff',    mkt:'E-MINI S&P 500 - CHICAGO MERCANTILE EXCHANGE',          yf:'^GSPC', histRange:[-200000,600000]},
  {key:'nasdaq', label:'💻 Nasdaq 100',  api:'tff',    mkt:'E-MINI NASDAQ-100 - CHICAGO MERCANTILE EXCHANGE',       yf:'^NDX',  histRange:[-80000,250000]},
  {key:'eurusd', label:'💶 EUR/USD',     api:'tff',    mkt:'EURO FX - CHICAGO MERCANTILE EXCHANGE',                 yf:'EURUSD=X',histRange:[-80000,200000]},
  {key:'jpyusd', label:'🇯🇵 JPY/USD',    api:'tff',    mkt:'JAPANESE YEN - CHICAGO MERCANTILE EXCHANGE',            yf:'JPY=X', histRange:[-80000,60000]},
  {key:'btc',    label:'₿ Bitcoin',     api:'tff',    mkt:'BITCOIN - CHICAGO MERCANTILE EXCHANGE',                 yf:'BTC-USD',histRange:[-5000,30000]},
  {key:'eth',    label:'Ξ Ethereum',    api:'tff',    mkt:'ETHER CASH SETTLED - CHICAGO MERCANTILE EXCHANGE',      yf:'ETH-USD',histRange:[-3000,18000]},
];

const LEGACY_API = 'https://publicreporting.cftc.gov/resource/6dca-aqww.json';
const TFF_API    = 'https://publicreporting.cftc.gov/resource/gpe5-46if.json';
const PROXIES    = ['https://corsproxy.io/?url=','https://api.allorigins.win/raw?url='];
const YF_PROXY   = 'https://corsproxy.io/?url=';

const store = {};   // {key: {cot:[], price:[], ml:{}}}
let current = 'gold';

// ── Tabs ──
const tabsEl = document.getElementById('tabs');
COMMODITIES.forEach(c => {
  const b = document.createElement('button');
  b.className = 'tab' + (c.key===current?' active':'');
  b.id = 'tab-'+c.key;
  b.textContent = c.label;
  b.onclick = () => { current=c.key; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderKey(c.key); };
  tabsEl.appendChild(b);
});

// ════════════════════════════════════════════════════════════════
// FETCH HELPERS
// ════════════════════════════════════════════════════════════════
async function proxyFetch(url) {
  for (const p of PROXIES) {
    try {
      const r = await fetch(p + encodeURIComponent(url), {cache:'no-store', signal:AbortSignal.timeout(18000)});
      if (!r.ok) continue;
      const t = await r.text();
      const j = JSON.parse(t);
      if (j && (Array.isArray(j) ? j.length > 0 : true)) return j;
    } catch(e){ continue; }
  }
  throw new Error('Proxy başarısız: ' + url.slice(0,60));
}

async function fetchCOT(com) {
  const api = com.api==='legacy' ? LEGACY_API : TFF_API;
  const n   = com.mkt.replace(/'/g,"''");
  const url = `${api}?$where=market_and_exchange_names='${n}'&$order=report_date_as_yyyy_mm_dd DESC&$limit=26`;
  const rows = await proxyFetch(url);
  rows.sort((a,b)=>(b.report_date_as_yyyy_mm_dd||'').localeCompare(a.report_date_as_yyyy_mm_dd||''));
  return rows.map(d => com.api==='legacy' ? parseLegacy(d) : parseTFF(d));
}

function g(d,f,fb)  { return parseFloat(d[f]||d[fb||f]||0)||0; }

function parseLegacy(d) {
  const sl=g(d,'noncomm_positions_long_all'), ss=g(d,'noncomm_positions_short_all');
  const cl=g(d,'comm_positions_long_all'),    cs=g(d,'comm_positions_short_all');
  return {
    date: d.report_date_as_yyyy_mm_dd||'?',
    specLong:sl, specShort:ss,
    specSpread: g(d,'noncomm_postions_spread_all','noncomm_positions_spread_all'),
    commLong:cl, commShort:cs,
    totLong:  g(d,'tot_rept_positions_long_all','tot_rpt_positions_long_all'),
    totShort: g(d,'tot_rept_positions_short_all','tot_rpt_positions_short_all'),
    oi: g(d,'open_interest_all'),
    chgSL: g(d,'change_in_noncomm_long_all'),
    chgSS: g(d,'change_in_noncomm_short_all'),
    chgCL: g(d,'change_in_comm_long_all'),
    chgCS: g(d,'change_in_comm_short_all'),
  };
}
function parseTFF(d) {
  const sl=g(d,'lev_money_positions_long_all'), ss=g(d,'lev_money_positions_short_all');
  const cl=g(d,'asset_mgr_positions_long_all'), cs=g(d,'asset_mgr_positions_short_all');
  return {
    date: d.report_date_as_yyyy_mm_dd||'?',
    specLong:sl, specShort:ss,
    specSpread: g(d,'lev_money_positions_spread_all'),
    commLong:cl, commShort:cs,
    totLong:  sl+cl+g(d,'dealer_positions_long_all')+g(d,'other_rept_positions_long_all'),
    totShort: ss+cs+g(d,'dealer_positions_short_all')+g(d,'other_rept_positions_short_all'),
    oi: g(d,'open_interest_all'),
    chgSL: g(d,'change_in_lev_money_long_all'),
    chgSS: g(d,'change_in_lev_money_short_all'),
    chgCL: g(d,'change_in_asset_mgr_long_all'),
    chgCS: g(d,'change_in_asset_mgr_short_all'),
  };
}

async function fetchPrice(yf) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yf)}?interval=1wk&range=6mo`;
  const data = await proxyFetch(url);
  const res  = data?.chart?.result?.[0];
  if (!res) throw new Error('YF no result');
  const ts      = res.timestamp;
  const closes  = res.indicators.quote[0].close;
  const highs   = res.indicators.quote[0].high;
  const lows    = res.indicators.quote[0].low;
  const volumes = res.indicators.quote[0].volume;
  return ts.map((t,i)=>({
    date: new Date(t*1000).toISOString().slice(0,10),
    close:  closes[i]  || null,
    high:   highs[i]   || null,
    low:    lows[i]    || null,
    volume: volumes[i] || null,
  })).filter(x=>x.close);
}

// ════════════════════════════════════════════════════════════════
// ML ENGINE  — Logistic Regression (tarayıcıda elle implemente)
// ════════════════════════════════════════════════════════════════
function buildFeatures(cot, price) {
  // COT'tan 12 hafta özellik üret
  const rows = [];
  const n    = Math.min(cot.length - 1, price ? price.length - 1 : cot.length - 1, 20);

  for (let i = 0; i < n; i++) {
    const w  = cot[i];
    const wp = cot[i+1] || cot[i];

    const net     = w.specLong  - w.specShort;
    const netPrev = wp.specLong - wp.specShort;
    const commNet = w.commLong  - w.commShort;

    // COT özellikleri
    const f1 = net;                                          // spec net
    const f2 = net - netPrev;                               // 1h delta
    const f3 = w.specShort > 0 ? w.specLong/w.specShort : 1; // L/S ratio
    const f4 = commNet;                                      // comm net
    const f5 = w.oi > 0 ? net / w.oi : 0;                  // net/OI
    const f6 = w.chgSL - w.chgSS;                          // chg net
    const f7 = (cot[i+1]&&cot[i+2]) ? (net - (cot[i+2].specLong-cot[i+2].specShort)) : 0; // 2h momentum

    // Fiyat özellikleri
    let f8=0, f9=0, f10=0;
    if (price && price[i] && price[i+1]) {
      f8  = (price[i].close - price[i+1].close) / price[i+1].close; // haftalık getiri
      f9  = price[i].high && price[i].low ? (price[i].close - price[i].low)/(price[i].high-price[i].low||1) : 0.5; // %K
      f10 = price[i].volume && price[i+1].volume ? price[i].volume/price[i+1].volume - 1 : 0; // vol değişimi
    }

    // Hedef: sonraki hafta fiyat yönü (eğitim verisi için)
    let target = null;
    if (price && price[i-1] && price[i]) {
      target = price[i-1].close > price[i].close ? 1 : 0; // 1=yükseliş, 0=düşüş
    }

    rows.push({ features:[f1,f2,f3,f4,f5,f6,f7,f8,f9,f10], target });
  }
  return rows;
}

function normalize(rows) {
  const nf = rows[0].features.length;
  const means = Array(nf).fill(0);
  const stds  = Array(nf).fill(1);
  const valid = rows.filter(r=>r.target!==null);
  if (valid.length < 2) return rows;
  for (let j=0; j<nf; j++) {
    const vals = valid.map(r=>r.features[j]);
    means[j] = vals.reduce((a,b)=>a+b,0)/vals.length;
    const variance = vals.reduce((a,b)=>a+(b-means[j])**2,0)/vals.length;
    stds[j]  = Math.sqrt(variance) || 1;
  }
  return { normalized: rows.map(r=>({ ...r, features:r.features.map((v,j)=>(v-means[j])/stds[j]) })), means, stds };
}

function sigmoid(z) { return 1/(1+Math.exp(-Math.max(-500,Math.min(500,z)))); }

function logisticRegression(trainRows, iters=400, lr=0.05) {
  const nf     = trainRows[0].features.length;
  const weights= Array(nf).fill(0);
  let   bias   = 0;

  for (let it=0; it<iters; it++) {
    let dw = Array(nf).fill(0), db = 0;
    for (const row of trainRows) {
      if (row.target === null) continue;
      const z   = row.features.reduce((s,f,j)=>s+f*weights[j],0) + bias;
      const pred= sigmoid(z);
      const err = pred - row.target;
      dw = dw.map((d,j)=>d + err*row.features[j]/trainRows.length);
      db += err/trainRows.length;
      // L2 regularization
      dw = dw.map((d,j)=>d + 0.01*weights[j]/trainRows.length);
    }
    weights.forEach((_,j)=>{ weights[j] -= lr*dw[j]; });
    bias -= lr*db;
  }
  return { weights, bias };
}

function runML(cot, price) {
  const rows    = buildFeatures(cot, price);
  const trainRows = rows.filter(r=>r.target!==null);

  if (trainRows.length < 4) {
    // Yeterli veri yoksa kural bazlı fallback
    return ruleBasedML(cot);
  }

  const { normalized, means, stds } = normalize(rows);
  const trainNorm = normalized.filter(r=>r.target!==null);

  // Model eğit
  const model = logisticRegression(trainNorm);

  // Güncel hafta tahmini (index 0, target=null)
  const current = normalized[0];
  const z = current.features.reduce((s,f,j)=>s+f*model.weights[j],0) + model.bias;
  const probUp = sigmoid(z);
  const probDn = 1 - probUp;

  // Cross-validation ile accuracy tahmini (son 4 hafta hariç tut)
  let correct = 0;
  const valRows = trainNorm.slice(0, Math.min(8, trainNorm.length));
  const trainSubset = trainNorm.slice(valRows.length);
  if (trainSubset.length >= 3) {
    const m2 = logisticRegression(trainSubset);
    for (const r of valRows) {
      const z2 = r.features.reduce((s,f,j)=>s+f*m2.weights[j],0) + m2.bias;
      if ((sigmoid(z2) > 0.5 ? 1 : 0) === r.target) correct++;
    }
  }
  const accuracy = trainSubset.length >= 3 ? Math.round(correct/valRows.length*100) : null;

  // Feature importance (|weight| normalize)
  const absW  = model.weights.map(Math.abs);
  const maxW  = Math.max(...absW, 0.001);
  const importance = absW.map(w=>w/maxW);

  const FEAT_NAMES = ['Spec Net','Net Delta','L/S Oran','Ticari Net','Net/OI','Chg Delta','2H Momentum','Fiyat Getiri','Stochastic','Volume Chg'];

  // BIAS kararı
  let bias, biasArrow, biasBg, biasColor;
  if      (probUp >= 0.68) { bias='LONG';  biasArrow='▲'; biasBg='#1a7a4a'; biasColor='#fff'; }
  else if (probUp >= 0.55) { bias='LONG';  biasArrow='△'; biasBg='#2e7d32'; biasColor='#fff'; }
  else if (probUp >= 0.45) { bias='NÖTR';  biasArrow='◆'; biasBg='#f5f0dc'; biasColor='#1a2332'; }
  else if (probUp >= 0.32) { bias='SHORT'; biasArrow='▽'; biasBg='#b45309'; biasColor='#fff'; }
  else                      { bias='SHORT'; biasArrow='▼'; biasBg='#b91c1c'; biasColor='#fff'; }

  return { probUp, probDn, bias, biasArrow, biasBg, biasColor,
           accuracy, importance, FEAT_NAMES, trainSize: trainRows.length,
           hasPriceData: price && price.length > 2 };
}

function ruleBasedML(cot) {
  // Fiyat verisi yoksa saf COT kural motoru
  const d   = cot[0], d1 = cot[1]||cot[0], d2=cot[2]||cot[1]||cot[0];
  const net  = d.specLong  - d.specShort;
  const net1 = d1.specLong - d1.specShort;
  const net2 = d2.specLong - d2.specShort;
  const comm = d.commLong  - d.commShort;

  let score = 0.5;
  score += (net > net1 ? 0.08 : -0.08);
  score += (net1 > net2 ? 0.05 : -0.05);
  score += (comm < 0 && net > 0 ? 0.10 : comm > 0 && net < 0 ? -0.10 : 0);
  score += (d.chgSL > d.chgSS ? 0.07 : -0.07);
  score += (d.oi > (d1.oi||d.oi) && net > net1 ? 0.05 : 0);
  score = Math.max(0.1, Math.min(0.9, score));

  const probUp = score, probDn = 1-score;
  let bias, biasArrow, biasBg, biasColor;
  if      (probUp>=0.68){bias='LONG'; biasArrow='▲';biasBg='#1a7a4a';biasColor='#fff';}
  else if (probUp>=0.55){bias='LONG'; biasArrow='△';biasBg='#2e7d32';biasColor='#fff';}
  else if (probUp>=0.45){bias='NÖTR'; biasArrow='◆';biasBg='#f5f0dc';biasColor='#1a2332';}
  else if (probUp>=0.32){bias='SHORT';biasArrow='▽';biasBg='#b45309';biasColor='#fff';}
  else                   {bias='SHORT';biasArrow='▼';biasBg='#b91c1c';biasColor='#fff';}

  return { probUp, probDn, bias, biasArrow, biasBg, biasColor,
           accuracy:null, importance:[.9,.8,.6,.7,.4,.5,.3,.0,.0,.0],
           FEAT_NAMES:['Spec Net','Net Delta','L/S Oran','Ticari Net','Net/OI','Chg Delta','2H Momentum','—','—','—'],
           trainSize:0, hasPriceData:false };
}

function buildReasons(cot, price, ml, com) {
  const d=cot[0], d1=cot[1]||cot[0], d2=cot[2]||cot[1]||cot[0];
  const net=d.specLong-d.specShort, net1=d1.specLong-d1.specShort;
  const comm=d.commLong-d.commShort;
  const [hMin,hMax]=com.histRange, hSpan=hMax-hMin;
  const netPct=hSpan>0?Math.round((net-hMin)/hSpan*100):50;

  const reasons=[];
  const dir=net>0?'net long':'net short';
  reasons.push({icon:'📊',text:`Spekülatörler <strong>${fmt(Math.abs(net))}</strong> kontrat <strong>${dir}</strong>. Haftalık değişim: <strong>${net>net1?'+':''}${fmt(net-net1)}</strong>.`});

  const streak = (() => { let s=0; const diffs=[net-net1,net1-(d2.specLong-d2.specShort)]; for(const x of diffs){if(Math.sign(x)===Math.sign(diffs[0]))s++;else break;} return s; })();
  if (streak>=2) reasons.push({icon:'📅',text:`Son <strong>${streak} hafta</strong> üst üste ${net>net1?'birikim artıyor':'birikim azalıyor'}.`});

  reasons.push({icon:'🏦',text: comm<0&&net>0
    ? `Ticari oyuncular <strong>${fmt(Math.abs(comm))} net short</strong> — üreticiler hedge yapıyor, spekülatörlerle klasik kutuplaşma.`
    : `Ticari oyuncular <strong>${fmt(Math.abs(comm))} net ${comm>0?'long':'short'}</strong> — ${comm>0&&net>0?'aynı yönde dikkat':'pozisyonlar ayrışmıyor'}.`});

  const extremeTag = netPct>85?`<span class="tag tag-short">AŞIRI LONG %${netPct}</span>`:netPct<15?`<span class="tag tag-long">AŞIRI SHORT %${netPct}</span>`:`<span class="tag tag-neutral">NORMAL %${netPct}</span>`;
  reasons.push({icon:'📏',text:`Tarihsel konum: ${extremeTag} — spekülatör net pozisyon tarihsel aralığın %${netPct}'inde.`});

  if (price&&price.length>=2) {
    const ret=((price[0].close-price[1].close)/price[1].close*100).toFixed(2);
    const pDir=price[0].close>price[1].close?'yükseldi':'düştü';
    const pColor=price[0].close>price[1].close?'#1a7a4a':'#c0392b';
    const cotDir=net>net1?'artıyor':'azalıyor';
    const aligned=(price[0].close>price[1].close&&net>net1)||(price[0].close<price[1].close&&net<net1);
    reasons.push({icon:aligned?'✅':'⚠',text:`Fiyat haftalık <strong style="color:${pColor}">${pDir} %${Math.abs(ret)}</strong>, COT birikim ${cotDir}. ${aligned?'<strong>Örtüşme onaylandı</strong> — trend güçlü.':'<strong>Divergence!</strong> — zıt yön, kırılım riski.'}`});

    // Fiyat seviyeleri
    const last5 = price.slice(0,5);
    const sup = Math.min(...last5.map(p=>p.low||p.close));
    const res = Math.max(...last5.map(p=>p.high||p.close));
    const range = res-sup;
    const posPct = range>0?Math.round((price[0].close-sup)/range*100):50;
    reasons.push({icon:'🎯',text:`Güncel fiyat <strong>${price[0].close.toFixed(2)}</strong> — 5 haftalık destek/direnç aralığının <strong>%${posPct}'inde</strong> (Destek: ${sup.toFixed(2)} · Direnç: ${res.toFixed(2)}).`});
  }

  // Breakers
  const breakers=[];
  if(ml.bias==='LONG'){
    breakers.push('Spec short bu haftadan itibaren hızla artarsa (chgSS > 5000) → bias tersine döner');
    if(netPct>80) breakers.push('Aşırı long bölgede — beklenmedik negatif haber short squeeze tetikleyebilir');
    breakers.push('OI düşerken fiyat yükselirse sahte kırılım, pozisyon azalt');
    if(comm>0) breakers.push('Ticari oyuncular short\'a geçerse kutuplaşma bozulur');
  } else if(ml.bias==='SHORT'){
    breakers.push('Spec long ani artışı (chgSL > 5000) görülürse → bias tersine döner');
    if(netPct<20) breakers.push('Aşırı short bölgede — short squeeze riski var, stop sıkı tut');
    breakers.push('Fiyat güçlü destek üzerinde kapanırsa COT dönüşü başlayabilir');
  } else {
    breakers.push('Net pozisyon bu hafta > +3000 olursa LONG bias devreye girer');
    breakers.push('Net pozisyon bu hafta < -3000 olursa SHORT bias devreye girer');
    breakers.push('Belirsizlik döneminde pozisyon boyutunu küçük tut');
  }
  return {reasons, breakers};
}

function setStatus(type,msg){
  document.getElementById('sdot').className='sdot '+(type==='busy'?'busy':type==='ok'?'ok':type==='err'?'err':'');
  document.getElementById('stext').textContent=msg;
}

async function runAll(){
  const btn=document.getElementById('run-btn');
  btn.disabled=true; btn.textContent='⏳ Çalışıyor...';
  setStatus('busy','Analiz başlıyor...');
  let ok=0,fail=0;

  for(const com of COMMODITIES){
    try{
      setStatus('busy',`[${ok+fail+1}/${COMMODITIES.length}] ${com.label} — COT çekiliyor...`);
      const cot = await fetchCOT(com);

      let price = null;
      try{
        setStatus('busy',`[${ok+fail+1}/${COMMODITIES.length}] ${com.label} — Fiyat çekiliyor...`);
        price = await fetchPrice(com.yf);
      }catch(e){ console.warn(com.key,'price fail:',e.message); }

      const ml = runML(cot, price);
      const {reasons,breakers} = buildReasons(cot, price, ml, com);
      store[com.key] = {cot, price, ml, reasons, breakers, com};
      document.getElementById('tab-'+com.key)?.style && (document.getElementById('tab-'+com.key).style.color='');
      ok++;
    }catch(e){
      console.warn(com.key,e.message);
      fail++;
    }
    if(store[current]) renderKey(current);
  }

  setStatus(fail===COMMODITIES.length?'err':'ok', `${ok} emtia analiz edildi${fail?` · ${fail} başarısız`:''}  — ${new Date().toLocaleTimeString('tr-TR')}`);
  document.getElementById('last-run').textContent='Son analiz: '+new Date().toLocaleTimeString('tr-TR');
  btn.disabled=false; btn.textContent='▶ Analiz Et';
  if(store[current]) renderKey(current);
}

  </div>`;

Object.defineProperty(window,'renderKey',{value:function(key){ if(store[key]){ const s=store[key]; current=key; _render(s); }},writable:true});

function _render(s){
  // already inline above — delegate
}
// Simpler: just call the render function directly
COMMODITIES.forEach(c=>{
  const btn=document.getElementById('tab-'+c.key);
  if(btn) btn.onclick=()=>{

    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
